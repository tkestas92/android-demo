services:
  redroid:
    image: redroid/redroid:13.0.0_64only-latest
    container_name: redroid-djbook
    privileged: true
    restart: unless-stopped
    ports:
      - "127.0.0.1:5556:5555"   # host-only — never expose this publicly
    volumes:
      - ./redroid-data:/data
    command:
      - androidboot.redroid_width=720
      - androidboot.redroid_height=1600
      - androidboot.redroid_dpi=280
      - androidboot.redroid_fps=30
      - androidboot.redroid_gpu_mode=guest
      - androidboot.use_memfd=true
      - ro.product.model=Pixel9
      - ro.product.brand=google
      - ro.product.manufacturer=Google
      - ro.product.device=tokay
      - ro.product.name=tokay
      - ro.build.product=tokay

  ws-scrcpy:
    image: ghostry/ws-scrcpy:latest
    container_name: ws-scrcpy-djbook
    restart: unless-stopped
    depends_on:
      - redroid
    volumes:
      - ./www/index.html:/ws-scrcpy/dist/public/index.html:ro
    ports:
      - "127.0.0.1:8002:8000"   # Caddy reverse-proxies to this, not exposed directly
